name: Bug report
description: Report a problem with Orca
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use this form for Orca bugs. Include enough detail for someone else to reproduce the issue.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem
      placeholder: Orca crashes when opening a repository with a nested package.json
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: orca_version
    attributes:
      label: Orca version
      description: Include the exact Orca version if you know it
      placeholder: v0.14.2
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Details
      description: Describe the bug in your own words. Please include reproduction steps and anything else that seems relevant.
      placeholder: |
        What happened?

        How can we reproduce it?
        1. ...
        2. ...
        3. ...

        Anything else that might help:
    validations:
      required: true
