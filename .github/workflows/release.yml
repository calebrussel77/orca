name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release, for example v1.1.37
        required: true
        type: string

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
    steps:
      - name: Resolve release metadata
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag_name="${{ inputs.tag_name }}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          if [[ -z "$tag_name" || ! "$tag_name" =~ ^v[0-9] ]]; then
            echo "Expected a version tag like v1.1.37, got '$tag_name'"
            exit 1
          fi

          if [[ "$tag_name" == *rc* ]]; then
            is_prerelease=true
          else
            is_prerelease=false
          fi

          echo "tag_name=$tag_name" >> "$GITHUB_OUTPUT"
          echo "release_ref=refs/tags/$tag_name" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  create-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Create draft release with auto-generated notes
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${{ needs.prepare-release.outputs.tag_name }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            exit 0
          fi

          gh release create "${{ needs.prepare-release.outputs.tag_name }}" \
            --draft \
            --generate-notes \
            --prerelease="${{ needs.prepare-release.outputs.is_prerelease }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs:
      - prepare-release
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            release_command: pnpm exec electron-builder --config config/electron-builder.config.cjs --win --publish always
          - os: ubuntu-latest
            platform: linux
            release_command: pnpm exec electron-builder --config config/electron-builder.config.cjs --linux --publish always

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-release.outputs.release_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build:release
        env:
          ORCA_RELEASE_REPOSITORY: ${{ github.repository }}

      - name: Publish release artifacts
        run: ${{ matrix.release_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORCA_RELEASE_REPOSITORY: ${{ github.repository }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-${{ matrix.platform }}-${{ needs.prepare-release.outputs.tag_name }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

  publish-release:
    needs:
      - prepare-release
      - release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        shell: bash
        run: |
          set -euo pipefail

          args=(
            "${{ needs.prepare-release.outputs.tag_name }}"
            --draft=false
            --repo "${{ github.repository }}"
          )

          if [[ "${{ needs.prepare-release.outputs.is_prerelease }}" != "true" ]]; then
            args+=(--latest)
          fi

          gh release edit "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
