name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create draft release with auto-generated notes
        run: gh release create ${{ github.ref_name }} --draft --generate-notes --prerelease=${{ contains(github.ref_name, 'rc') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            release_command: pnpm exec electron-builder --config config/electron-builder.config.cjs --win --publish always
          - os: ubuntu-latest
            platform: linux
            release_command: pnpm exec electron-builder --config config/electron-builder.config.cjs --linux --publish always

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build:release
        env:
          ORCA_RELEASE_REPOSITORY: ${{ github.repository }}

      - name: Publish release artifacts
        run: ${{ matrix.release_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORCA_RELEASE_REPOSITORY: ${{ github.repository }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orca-${{ matrix.platform }}-${{ github.ref_name }}
          path: |
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: warn

  publish-release:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
