name: Cut Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Which semver increment to cut
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
          - custom
      custom_version:
        description: Exact semver to use when release_type=custom
        required: false
        type: string
      prerelease_id:
        description: Prerelease identifier used when release_type=prerelease
        required: false
        default: rc
        type: string

jobs:
  cut-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Ensure workflow runs from the default branch
        run: |
          if [ "${{ github.ref_name }}" != "${{ github.event.repository.default_branch }}" ]; then
            echo "Run this workflow from ${{ github.event.repository.default_branch }}."
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and create tag
        shell: bash
        run: |
          set -euo pipefail

          release_type="${{ inputs.release_type }}"
          custom_version="${{ inputs.custom_version }}"
          prerelease_id="${{ inputs.prerelease_id }}"

          if [[ "$release_type" == "custom" ]]; then
            if [[ -z "$custom_version" ]]; then
              echo "custom_version is required when release_type=custom"
              exit 1
            fi
            npm version "$custom_version" -m "chore(release): %s"
          elif [[ "$release_type" == "prerelease" ]]; then
            npm version prerelease --preid "$prerelease_id" -m "chore(release): %s"
          else
            npm version "$release_type" -m "chore(release): %s"
          fi

      - name: Push release commit and tag
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags
